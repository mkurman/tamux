schemaVersion: 1
title: "Web Browser"
when: "webBrowserOpen"
blocks:
  browserPanelShell:
    title: "Browser Panel Shell"
    builder:
      category: "panel"
      editable: true
    defaults:
      visible: true
      resizable: true
      resizeAxis: "horizontal"
      minWidth: 420
      maxWidth: "80vw"
      height: "100%"
      style:
        maxWidth: 1200
        display: "flex"
        flexDirection: "column"
        position: "relative"
        flexShrink: 0
        height: "100%"
        minHeight: 0
        minWidth: 420
        overflow: "hidden"
        zIndex: 2900
        wrapperStyle:
          title: "Web Browser"
          height: "100%"
    layout:
      id: "blocks/browserPanelShell/layout"
      use: "amux-primitive-box"
      builder:
        editable: true
layout:
  id: "web-browser-root"
  use: "browserPanelShell"
  builder:
    editable: true
  children:
    - id: "web-browser-panel"
      type: "WebBrowserPanel"
      props:
        visible: true
        resizable: true
        resizeAxis: "horizontal"
        minWidth: 420
        maxWidth: "80vw"
        height: "100%"
        wrapperStyle:
          title: "Web Browser"
          height: "100%"
      builder:
        editable: true
